<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="milwaukeeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" fill="url(#milwaukeeGrad)"/>
  
  <!-- Impact driver silhouette -->
  <g transform="translate(40, 40)">
    <!-- Main body -->
    <rect x="30" y="30" width="70" height="35" fill="#1a1a1a" rx="8"/>
    <!-- Handle -->
    <rect x="100" y="40" width="50" height="25" fill="#1a1a1a" rx="12"/>
    <!-- Chuck -->
    <circle cx="25" cy="47" r="8" fill="#333"/>
    <!-- Battery pack -->
    <rect x="120" y="65" width="35" height="30" fill="#333" rx="4"/>
    <!-- Milwaukee logo area -->
    <rect x="40" y="35" width="40" height="10" fill="#DC143C" rx="2"/>
    <text x="60" y="42" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="white">MILWAUKEE</text>
    <!-- M18 badge -->
    <circle cx="80" cy="55" r="8" fill="#FFD700"/>
    <text x="80" y="58" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="black">M18</text>
  </g>
  
  <!-- Text overlay -->
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">
    LIBERA EL PODER
  </text>
</svg>